output_path: "./reports"
retention_days: 90

categories:
  - "模型发布"
  - "研究"
  - "产品与功能"
  - "商业动态"
  - "政策与安全"
  - "教程与观点"

analysis:
  dimensions:
    - name: tags
      prompt: "提取 3-5 个关键词标签，用于关联分析"
      type: list
      render: inline_tags

    - name: practice_suggestions
      prompt: "如果涉及可上手尝试的产品或功能，给出 1-3 条具体的实践建议，包括操作步骤"
      condition: "category in ['模型发布', '产品与功能']"
      type: list
      render: callout_block

filtering:
  # Articles with importance < min_importance are still fully analyzed and
  # persisted to history.json, but excluded from the daily report. Weekly/
  # monthly reports re-aggregate from history and can apply their own
  # thresholds if needed.
  min_importance: 2

alerting:
  consecutive_failure_threshold: 3
  method: github_issue

sources:
  - name: "Berkeley RDI"
    type: rss
    url: "https://berkeleyrdi.substack.com/api/v1/archive?sort=new&limit=20"
    role: aggregator

  - name: "The Batch"
    type: web_scraper
    url: "https://www.deeplearning.ai/the-batch/"
    role: aggregator

  - name: "宝玉的分享"
    type: rss
    url: "https://baoyu.io/feed.xml"
    role: aggregator
    max_silence_hours: 336

  - name: "OpenAI Blog"
    type: rss
    url: "https://openai.com/blog/rss.xml"
    role: primary

  - name: "Google AI Blog"
    type: rss
    url: "https://blog.google/technology/ai/rss/"
    role: primary

  - name: "Anthropic Blog"
    type: web_scraper
    url: "https://www.anthropic.com/news"
    role: primary

  - name: "Anthropic Research"
    type: web_scraper
    url: "https://www.anthropic.com/research"
    role: primary

  # Twitter sources are fetched via socialdata.tools REST API. The `url`
  # field below points to the human-readable X.com profile; each route
  # module under scripts/routes/twitter-*.js hardcodes both the screen-name
  # handle and the stable numeric userId (socialdata's tweets endpoint is
  # keyed by ID). The API key is passed at runtime via the SOCIALDATA_API_KEY
  # env var (GH Actions secret).
  #
  # max_silence_hours: if the newest item from this source is older than
  # this threshold, the fetcher marks the source as `degraded_stale` (see
  # scripts/fetch-sources.js). Tune per-account cadence: active accounts
  # = 168h (7d), moderate = 336h (14d), rare = 720h (30d), dormant-but-kept
  # = 8760h (1 year). When socialdata itself goes down or the API key is
  # revoked, all Twitter sources `error` simultaneously — distinct from
  # individual account silences.
  - name: "Sam Altman (Twitter)"
    type: rss
    url: "https://x.com/sama"
    role: aggregator
    max_silence_hours: 168

