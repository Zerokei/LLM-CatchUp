name: Daily Fetch

on:
  schedule:
    - cron: '37 23 * * *'  # 07:37 Asia/Shanghai (UTC+8) — odd minute to avoid GH Actions congestion at :00/:30
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fetch-sources
        run: node scripts/fetch-sources.js

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fetch-cache/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
          else
            git commit -m "chore(catchup): daily fetch snapshot $(TZ=Asia/Shanghai date +%Y-%m-%d)"
            git push
          fi
