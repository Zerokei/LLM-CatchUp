name: Daily Fetch

on:
  schedule:
    - cron: '37 0 * * *'  # Main fetch after the target US day closes. Odd minute avoids GH Actions congestion.
      timezone: America/Los_Angeles
    - cron: '17 3 * * *'  # Retry window if GitHub drops or delays the first scheduled event.
      timezone: America/Los_Angeles
  workflow_dispatch:
    inputs:
      report_date:
        description: 'YYYY-MM-DD (America/Los_Angeles reporting date). Defaults to yesterday in Pacific time if empty.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fetch-sources
        run: node scripts/fetch-sources.js
        env:
          SOCIALDATA_API_KEY: ${{ secrets.SOCIALDATA_API_KEY }}
          REPORT_DATE: ${{ inputs.report_date }}

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fetch-cache/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
          else
            SNAPSHOT_DATE="${{ inputs.report_date }}"
            if [ -z "$SNAPSHOT_DATE" ]; then
              SNAPSHOT_DATE="$(TZ=America/Los_Angeles date -d yesterday +%Y-%m-%d)"
            fi
            git commit -m "chore(catchup): daily fetch snapshot ${SNAPSHOT_DATE}"
            git push
          fi
