name: Email Reports

on:
  push:
    branches: [main]
    paths:
      - 'reports/daily/**'
      - 'reports/weekly/**'
      - 'reports/monthly/**'
  workflow_dispatch:
    inputs:
      report_path:
        description: 'Exact report path to send (e.g. reports/daily/2026-04-14.md). Overrides backfill_days.'
        required: false
        type: string
        default: ''
      backfill_days:
        description: 'Send all reports whose filename-embedded date is within the last N days (Asia/Shanghai). Ignored if report_path is set.'
        required: false
        type: string
        default: '0'

permissions:
  contents: read

concurrency:
  group: email-reports
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send
        run: node scripts/email-reports.js
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPORT_PATH: ${{ inputs.report_path }}
          BACKFILL_DAYS: ${{ inputs.backfill_days }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
